  think-id:
    container_name: think_id_app
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        APP_NAME: think-id
    restart: unless-stopped
    ports:
      - "3011:3000"
    environment:
      - BUSINESS_SERVER_API_URL=http://think-business-listing-app:8081
    networks:
      - default


  business-listing:
    container_name: business_listing_app
    build:
      context: ../../
      dockerfile: Dockerfile
      args:
        APP_NAME: business-listing
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file:
      - ../business-listing/.env
    environment:
      - BUSINESS_SERVER_API_URL=http://think-business-listing-app:8081
      - NODE_OPTIONS=--dns-result-order=ipv4first
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    networks:
      - default
      - app-network


volumes:
  db_data:
    driver: local

networks:
  default:
    name: business-listing-network
  app-network:
    external: true
    name: app-network