version: "3.8"

services:
  # Business Listing Frontend (Next.js)
  business-listing:
    container_name: business_listing_app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: business-listing
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file:
      - ./apps/business-listing/.env
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - BUSINESS_SERVER_API_URL=http://think-business-listing-app:8081
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    networks:
      - app-network

  # Think ID Frontend (Next.js)
  think-id:
    container_name: think_id_app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: think-id
    restart: unless-stopped
    ports:
      - "3011:3000"
    env_file:
      - ./apps/think-id/.env
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
      - BUSINESS_SERVER_API_URL=http://think-business-listing-app:8081
    dns:
      - 8.8.8.8
      - 8.8.4.4
    dns_opt:
      - ndots:0
    networks:
      - app-network

  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: think_business_registration
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./apps/business-listing/scripts/setup-database.sql:/docker-entrypoint-initdb.d/setup-database.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d think_business_registration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - app-network

  # Prisma Migrator (runs migrations and exits)
  prisma-migrator:
    image: node:20-alpine
    container_name: prisma_migrator
    working_dir: /app
    volumes:
      - ./apps/business-listing:/app:cached
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://myuser:password@db:5432/think_business_registration?schema=public"
    command: sh ./scripts/docker-init.sh
    restart: 'no'
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    name: app-network
    driver: bridge
